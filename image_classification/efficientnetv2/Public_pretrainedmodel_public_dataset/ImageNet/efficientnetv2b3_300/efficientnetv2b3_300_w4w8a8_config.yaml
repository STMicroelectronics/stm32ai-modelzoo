general:
  project_name: null
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: false
  global_seed: 123
  gpu_memory_limit: 24
model:
  model_path: ../../stm32ai-modelzoo/image_classification/efficientnetv2/Public_pretrainedmodel_public_dataset/imagenet/efficientnetv2b3_300/efficientnetv2b3_300.keras
operation_mode: quantization
dataset:
  dataset_name: imagenet
  classes_file_path: ./datasets/labels_imagenet.txt
  test_path: /local/data/ic_imagenet_2012/validation/
  quantization_path: /local/data/ic_imagenet_2012/quantization/
  quantization_split: 0.001
  check_image_files: false
  seed: 2
preprocessing:
  rescaling:
    scale: 1/127.5
    offset: -1
  resizing:
    interpolation: nearest
    aspect_ratio: fit
  color_mode: rgb
quantization:
  operating_mode: full_auto
  quantizer: Onnx_quantizer
  quantization_type: PTQ
  target_opset: 21
  granularity: per_channel
  export_dir: quantized_models
  quantization_input_type: uint8
  quantization_output_type: float
  onnx_quant_parameters:
    weightType: Int8
    activType: Int8
  onnx_extra_options:
    WeightSymmetric: true
    ActivationSymmetric: false
    QuantizeBias: true
    CalibMovingAverage: true
  iterative_quant_parameters:
    accuracy_tolerance: 1.5
mlflow:
  uri: ./tf/src/experiments_outputs/mlruns
hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
