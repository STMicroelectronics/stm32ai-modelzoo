general:
  project_name: imagenet
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: false
  global_seed: 127
  gpu_memory_limit: 24
  num_threads_tflite: 12

operation_mode: chain_eqeb

model:
#  model_path: ../../stm32ai-modelzoo/image_classification/mobilenetv1/Public_pretrainedmodel_public_dataset/imagenet/mobilenetv1_a025_224/mobilenetv1_a025_224.h5
  model_name: mobilenetv1_a025
  input_shape: (224, 224, 3)
  pretrained: True

dataset:
  dataset_name: imagenet
  classes_file_path: ./datasets/labels_imagenet.txt
  test_path: "/local/datasets/ic_imagenet_2012/validation/"
  quantization_path: "/local/datasets/ic_imagenet_2012/quantization/"
  quantization_split: 0.001

preprocessing:
  rescaling: { scale: 1/127.5, offset: -1 }
  resizing:
    interpolation: nearest
    aspect_ratio: fit
  color_mode: rgb

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  granularity: per_tensor
  optimize: True
  export_dir: quantized_models

tools:
   stedgeai:
      optimization: balanced
      on_cloud: True
      path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
   path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe

benchmarking:
   board: STM32H747I-DISCO
mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
