general:
  project_name: tf_flowers
  logs_dir: logs
  saved_models_dir: saved_models
  global_seed: 127
  gpu_memory_limit: 24

operation_mode: chain_tqeb

model:
  model_name: mobilenetv1_a025
  input_shape: (96, 96, 3)
  pretrained: True

dataset:
  dataset_name: tf_flowers
  class_names:
  - daisy
  - dandelion
  - roses
  - sunflowers
  - tulips
  training_path: ./datasets/flower_photos
  validation_path: null
  validation_split: 0.2
  test_path: null
  quantization_path: null
  quantization_split: 0.25
  seed: 127

preprocessing:
  rescaling:
    scale: 1/127.5
    offset: -1
  resizing:
    interpolation: nearest
    aspect_ratio: fit
  color_mode: rgb

data_augmentation:
  random_hue:
    delta: 0.03
    change_rate: 1.0
  random_brightness:
    factor: 0.3
  random_contrast:
    factor: 0.25
  random_zoom:
    width_factor: 0.2
    height_factor: 0.2
    fill_mode: nearest
    interpolation: nearest
  random_translation:
    width_factor: 0.35
    height_factor: 0.35
    fill_mode: wrap #reflect
    interpolation: nearest
  random_rotation:
    factor: 0.25
    fill_mode: wrap #reflect
    interpolation: nearest
  random_flip:
    mode: horizontal
  random_shear:
    factor: 0.1
    fill_mode: wrap
    interpolation: nearest

training:
  frozen_layers: None
  dropout: 0.7
  batch_size: 64
  epochs: 3000
  optimizer:
    Adam:
      learning_rate: 0.0002
  callbacks:
    ReduceLROnPlateau:
      monitor: val_accuracy
      mode: max
      factor: 0.75
      patience: 40
      min_lr: 1.0e-05
    EarlyStopping:
      monitor: val_accuracy
      mode: max
      restore_best_weights: true
      patience: 200

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  export_dir: quantized_models

tools:
  stedgeai:
    optimization: balanced
    on_cloud: True
    path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe

benchmarking:
  board: STM32H747I-DISCO

deployment:
  c_project_path: ../application_code/image_classification/
  IDE: GCC
  verbosity: 1
  hardware_setup:
    serie: STM32H7
    board: STM32H747I-DISCO
    input: CAMERA_INTERFACE_DCMI
    output: DISPLAY_INTERFACE_USB

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
