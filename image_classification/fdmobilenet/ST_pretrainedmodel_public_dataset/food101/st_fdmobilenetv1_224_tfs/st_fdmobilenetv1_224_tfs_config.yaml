  - baby_back_ribs
  - baklava
  - beef_carpaccio
  - beef_tartare
  - beet_salad
  - beignets
  - bibimbap
  - bread_pudding
  - breakfast_burrito
  - bruschetta
  - caesar_salad
  - cannoli
  - caprese_salad
  - carrot_cake
  - ceviche
  - cheesecake
  - cheese_plate
  - chicken_curry
  - chicken_quesadilla
  - chicken_wings
  - chocolate_cake
  - chocolate_mousse
  - churros
  - clam_chowder
  - club_sandwich
  - crab_cakes
  - creme_brulee
  - croque_madame
  - cup_cakes
  - deviled_eggs
  - donuts
  - dumplings
  - edamame
  - eggs_benedict
  - escargots
  - falafel
  - filet_mignon
  - fish_and_chips
  - foie_gras
  - french_fries
  - french_onion_soup
  - french_toast
  - fried_calamari
  - fried_rice
  - frozen_yogurt
  - garlic_bread
  - gnocchi
  - greek_salad
  - grilled_cheese_sandwich
  - grilled_salmon
  - guacamole
  - gyoza
  - hamburger
  - hot_and_sour_soup
  - hot_dog
  - huevos_rancheros
  - hummus
  - ice_cream
  - lasagna
  - lobster_bisque
  - lobster_roll_sandwich
  - macaroni_and_cheese
  - macarons
  - miso_soup
  - mussels
  - nachos
  - omelette
  - onion_rings
  - oysters
  - pad_thai
  - paella
  - pancakes
  - panna_cotta
  - peking_duck
  - pho
  - pizza
  - pork_chop
  - poutine
  - prime_rib
  - pulled_pork_sandwich
  - ramen
  - ravioli
  - red_velvet_cake
  - risotto
  - samosa
  - sashimi
  - scallops
  - seaweed_salad
  - shrimp_and_grits
  - spaghetti_bolognese
  - spaghetti_carbonara
  - spring_rolls
  - steak
  - strawberry_shortcake
  - sushi
  - tacos
  - takoyaki
  - tiramisu
  - tuna_tartare
  - waffles
  training_path: /local/datasets/ic_food101_official/train/
  validation_path: /local/datasets/ic_food101_official/test/
  validation_split: null
  test_path: /local/datasets/ic_food101_official/test/
  quantization_path: /local/datasets/ic_food101_official/quant/
  quantization_split: null
  check_image_files: false
  seed: 127

preprocessing:
  rescaling:
    scale: 1/255.0
    offset: 0
  resizing:
    interpolation: nearest
    aspect_ratio: fit
  color_mode: rgb

data_augmentation:
  random_contrast:
    factor: 0.25
  random_brightness:
    factor: 0.1
  random_flip:
    mode: horizontal
  random_translation:
    width_factor: 0.25
    height_factor: 0.25
    fill_mode: wrap
    interpolation: nearest
  random_rotation:
    factor: 0.1
    fill_mode: wrap
    interpolation: nearest
  random_zoom:
    width_factor: 0.2
    height_factor: 0.2
    fill_mode: wrap
    interpolation: nearest
  random_shear:
    factor: 0.1
    fill_mode: wrap
    interpolation: nearest

training:
  frozen_layers: None
  dropout: 0.4
  batch_size: 128
  epochs: 800
  optimizer:
    Adam:
      learning_rate: 0.0025
  callbacks:
    LRWarmupCosineDecay:
      initial_lr: 1.0e-05
      warmup_steps: 20
      max_lr: 0.0025
      hold_steps: 30
      decay_steps: 600
      end_lr: 1.0e-05
    EarlyStopping:
      monitor: val_accuracy
      mode: max
      restore_best_weights: true
      patience: 100

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  export_dir: quantized_models

tools:
  stedgeai:
    optimization: balanced
    on_cloud: True
    path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe

benchmarking:
  board: STM32H747I-DISCO

deployment:
  c_project_path: ../application_code/image_classification/
  IDE: GCC
  verbosity: 1
  hardware_setup:
    serie: STM32H7
    board: STM32H747I-DISCO
    input: SPI_CAMERA
    output: USB_DISPLAY

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}

