general:
  project_name: food101
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: false
  global_seed: 127
  gpu_memory_limit: 24
  num_threads_tflite: 12

operation_mode: chain_tqeb

model:
  model_name: st_fdmobilenetv1
  input_shape: (224, 224, 3)
  pretrained: False

