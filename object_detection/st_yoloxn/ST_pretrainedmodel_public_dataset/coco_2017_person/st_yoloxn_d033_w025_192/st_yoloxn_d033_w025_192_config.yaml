general:
  project_name: st_yoloxn_0.33_0.25_192
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: false
  gpu_memory_limit: 16
  num_threads_tflite: 12
  global_seed: 127

model:
  model_type: st_yoloxn
  model_name: st_yoloxn_d033_w025
  input_shape: (192,192,3)
  pretrained: false

operation_mode: chain_tqeb

dataset:
  dataset_name: coco
  format: tfs
  class_names:
  - person
  train_images_path: /local/data/od_coco_2017_person/train
  train_annotations_path: /local/data/od_coco_2017_person/train
  val_images_path: /local/data/od_coco_2017_person/test
  val_annotations_path: /local/data/od_coco_2017_person/test
  test_images_path: /local/data/od_coco_2017_person/test
  test_annotations_path: /local/data/od_coco_2017_person/test
  quantization_path: /local/data/od_coco_2017_person/train
  quantization_split: 0.001

preprocessing:
  rescaling:
    scale: 1/255
    offset: 0
  resizing:
    aspect_ratio: fit
    interpolation: nearest
  color_mode: rgb

data_augmentation:
  random_periodic_resizing:
    period: 20
    image_sizes:
    - (128, 128)    
    - (160, 160)
    - (192, 192)
    - (224, 224)
    - (256, 256)
    - (288, 288)
    - (320, 320)
  random_contrast:
    factor: 0.4
  random_brightness:
    factor: 0.3
  random_flip:
    mode: horizontal
  random_rotation:
    factor: 0.02
    fill_mode: wrap
    interpolation: nearest

training:
  dropout: null
  batch_size: 64
  epochs: 400
  optimizer:
    Adam:
      learning_rate: 0.0025
  callbacks:
    LRWarmupCosineDecay:
      initial_lr: 1.0e-05
      warmup_steps: 20
      max_lr: 0.00125
      hold_steps: 20
      decay_steps: 300
      end_lr: 1.0e-06
    EarlyStopping:
      monitor: val_loss
      patience: 60
      restore_best_weights: true
      verbose: 1

postprocessing:
  confidence_thresh: 0.001
  NMS_thresh: 0.5
  IoU_eval_thresh: 0.5
  plot_metrics: false
  max_detection_boxes: 100

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  export_dir: quantized_models

tools:
  stedgeai:
    optimization: balanced
    on_cloud: true
    path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe

benchmarking:
  board: STM32H747I-DISCO

mlflow:
   uri: ./tf/src/experiments_outputs/mlruns

hydra:
   run:
      dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
