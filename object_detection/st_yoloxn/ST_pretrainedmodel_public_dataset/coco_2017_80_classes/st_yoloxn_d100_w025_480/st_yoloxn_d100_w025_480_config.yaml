general:
  project_name: st_yoloxn_480_1.0_0.25_3anchors_fullcoco_official
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: false
  gpu_memory_limit: 24
  num_threads_tflite: 24
  global_seed: 123

model:
  model_type: st_yoloxn
  model_name: st_yoloxn_d100_w025
  pretrained: false

operation_mode: chain_tqeb

dataset:
  dataset_name: coco
  format: tfs
  class_names:
  - person
  - bicycle
  - car
  - motorcycle
  - airplane
  - bus
  - train
  - truck
  - boat
  - traffic light
  - fire hydrant
  - stop sign
  - parking meter
  - bench
  - bird
  - cat
  - dog
  - horse
  - sheep
  - cow
  - elephant
  - bear
  - zebra
  - giraffe
  - backpack
  - umbrella
  - handbag
  - tie
  - suitcase
  - frisbee
  - skis
  - snowboard
  - sports ball
  - kite
  - baseball bat
  - baseball glove
  - skateboard
  - surfboard
  - tennis racket
  - bottle
  - wine glass
  - cup
  - fork
  - knife
  - spoon
  - bowl
  - banana
  - apple
  - sandwich
  - orange
  - broccoli
  - carrot
  - hot dog
  - pizza
  - donut
  - cake
  - chair
  - couch
  - potted plant
  - bed
  - dining table
  - toilet
  - tv
  - laptop
  - mouse
  - remote
  - keyboard
  - cell phone
  - microwave
  - oven
  - toaster
  - sink
  - refrigerator
  - book
  - clock
  - vase
  - scissors
  - teddy bear
  - hair drier
  - toothbrush
  training_path: /local/data/od_coco_2017/train
  validation_path: /local/data/od_coco_2017/test
  test_path: /local/data/od_coco_2017/test
  quantization_path: /local/data/od_coco_2017/train
  quantization_split: 0.001 #0.0005

preprocessing:
  rescaling:
    scale: 1/255
    offset: 0
  resizing:
    aspect_ratio: fit
    interpolation: nearest
  color_mode: rgb

data_augmentation:
  random_crop:
    crop_center_x: (0.25, 0.75)
    crop_center_y: (0.25, 0.75)
    crop_width: (0.6, 0.9)
    crop_height: (0.6, 0.9)
    change_rate: 0.5
  random_periodic_resizing:
    period: 20
    image_sizes:
#    - (224, 224)
#    - (256, 256)
#    - (288, 288)
    - (320, 320)
    - (352, 352)
    - (384, 384)
    - (416, 416)
    - (448, 448)
    - (480, 480)
    - (512, 512)
    - (544, 544)
    - (576, 576)
    - (608, 608)
  random_contrast:
    factor: 0.4
  random_brightness:
    factor: 0.3
  random_flip:
    mode: horizontal
  random_rotation:
    factor: 0.02
    fill_mode: reflect
    interpolation: nearest

training:
  dropout: null
  batch_size: 64
  epochs: 550
  optimizer:
    Adam:
      learning_rate: 0.0025
  callbacks:
    LRWarmupCosineDecay:
      initial_lr: 1.0e-05
      warmup_steps: 20
      max_lr: 0.00125
      hold_steps: 20
      decay_steps: 500
      end_lr: 1.0e-06
    EarlyStopping:
      monitor: val_loss
      patience: 80
      restore_best_weights: true
      verbose: 1

postprocessing:
  yolo_anchors:
  - 0.5
  - 0.5
  - 0.07
  - 0.25
  - 0.23
  - 0.7
  confidence_thresh: 0.001
  NMS_thresh: 0.5
  IoU_eval_thresh: 0.5
  plot_metrics: false
  max_detection_boxes: 100

quantization:
  quantizer: TFlite_converter
  granularity: per_channel
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  export_dir: quantized_models

tools:
  stedgeai:
    optimization: balanced
    on_cloud: true
    path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe

benchmarking:
  board: STM32N6570-DK

mlflow:
   uri: ./tf/src/experiments_outputs/mlruns

hydra:
   run:
      dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
