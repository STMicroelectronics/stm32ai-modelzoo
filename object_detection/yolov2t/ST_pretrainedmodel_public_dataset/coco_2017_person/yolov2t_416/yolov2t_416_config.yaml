general:
  project_name: yolov2t_416
  logs_dir: logs
  saved_models_dir: saved_models
  gpu_memory_limit: 16
  num_threads_tflite: 12
  global_seed: 127

model:
  model_type: yolov2t
  model_name: yolov2t
  input_shape: (416, 416, 3)
  pretrained: false

operation_mode: chain_tqeb
#choices=['training' , 'evaluation', 'deployment', 'quantization', 'benchmarking',
#        'chain_tqeb','chain_tqe','chain_eqe','chain_qb','chain_eqeb','chain_qd ']

dataset:
  dataset_name: coco
  format: tfs
  class_names: [ person ]
  training_path: /local/data/od_coco_2017_person/train
  validation_path: /local/data/od_coco_2017_person/test
  test_path: /local/data/od_coco_2017_person/test
  quantization_path: /local/data/od_coco_2017_person/train
  quantization_split: 0.05

preprocessing:
  rescaling: { scale: 1/127.5, offset: -1 }
  resizing:
    aspect_ratio: fit
    interpolation: nearest
  color_mode: rgb

data_augmentation:
  random_crop:
    crop_center_x: (0.25, 0.75)
    crop_center_y: (0.25, 0.75)
    crop_width: (0.6, 0.9)
    crop_height: (0.6, 0.9)
    change_rate: 0.5
  random_periodic_resizing:
    period: 20
    image_sizes: [(320, 320), (352, 352), (384, 384), (416, 416), 
                  (448, 448), (480, 480), (512, 512)]
  random_flip:
    mode: horizontal
  random_contrast:
    factor: 0.4
  random_brightness:
    factor: 0.3
  random_rotation:
    factor: 0.02
    fill_mode: wrap
    interpolation: nearest
    
training:
  dropout:
  batch_size: 64
  epochs: 500
  optimizer:
    Adam:
      learning_rate: 0.0025
  callbacks:
    LRWarmupCosineDecay:
      initial_lr: 1.0e-05
      warmup_steps: 20
      max_lr: 0.00125
      hold_steps: 20
      decay_steps: 300
      end_lr: 1.0e-06
    EarlyStopping:
      monitor: val_map
      patience: 100
      restore_best_weights: true
      verbose: 1
#  optimizer:
#    Adam:
#      learning_rate: 0.001
#  callbacks:
#    ReduceLROnPlateau:
#      monitor: val_map
#      patience: 15
#    ModelCheckpoint:
#      monitor: val_map
#    EarlyStopping:
#      monitor: val_map
#      patience: 40

postprocessing:
  confidence_thresh: 0.001
  NMS_thresh: 0.5
  IoU_eval_thresh: 0.5
  plot_metrics: False   # Plot precision versus recall curves. Default is False.
  max_detection_boxes: 100

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: float
  granularity: per_channel   #per_tensor
  optimize: False   #can be True if per_tensor
  export_dir: quantized_models

benchmarking:
  board: STM32H747I-DISCO

tools:
  stedgeai:
    optimization: balanced
    on_cloud: True
    path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe

deployment:
  c_project_path: ../application_code/object_detection/
  IDE: GCC
  verbosity: 1
  hardware_setup:
    serie: STM32H7
    board: STM32H747I-DISCO

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/yolov2t_416
    