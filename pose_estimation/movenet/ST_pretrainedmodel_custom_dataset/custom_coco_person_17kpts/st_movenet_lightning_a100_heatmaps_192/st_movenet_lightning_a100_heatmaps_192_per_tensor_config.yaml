general:
  project_name: COCO_2017_pose_Demo
  logs_dir: logs
  saved_models_dir: saved_models
  num_threads_tflite: 8
  gpu_memory_limit: 20
  global_seed: 123

model:
  model_type: heatmaps_spe
  model_path: ../../stm32ai-modelzoo/pose_estimation/movenet/ST_pretrainedmodel_custom_dataset/custom_coco_person_17kpts/st_movenet_lightning_a100_heatmaps_192/st_movenet_lightning_a100_heatmaps_192.keras
  #model_name: st_movenet_lightning_a100_heatmaps
  input_shape: (192, 192, 3)
  pretrained: True
  final_activation: softmax

operation_mode: chain_eqe

dataset:
  dataset_name: coco
  keypoints: 17
  class_names: [person]
  training_path: /local/data/pe_coco_2017/single_extended/17kpts/train
  validation_split: 0.05
  test_path: /local/data/pe_coco_2017/single_extended/17kpts/val
  quantization_split: 0.01

preprocessing:
  rescaling: { scale: 1/127.5, offset: -1 }
  resizing:
    aspect_ratio: fit
    interpolation: nearest
  color_mode: rgb

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: int8
  granularity: per_tensor
  optimize: True
  export_dir: quantized_models

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}