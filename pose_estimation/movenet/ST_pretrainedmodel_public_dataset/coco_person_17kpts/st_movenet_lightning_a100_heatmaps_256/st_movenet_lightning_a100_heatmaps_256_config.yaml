general:
  project_name: COCO_2017_pose_Demo
  logs_dir: logs
  saved_models_dir: saved_models
  num_threads_tflite: 8
  gpu_memory_limit: 20
  global_seed: 123

model:
  model_type: heatmaps_spe
  model_name: st_movenet_lightning_a100_heatmaps
  input_shape: (256, 256, 3)
  pretrained: True
  final_activation: softmax

operation_mode: chain_tqe

dataset:
  dataset_name: coco
  keypoints: 17
  class_names: [person]
  training_path: /local/data/pe_coco_2017/single/17kpts/train
  validation_split: 0.05
  test_path: /local/data/pe_coco_2017/single/17kpts/test
  quantization_split: 0.1

preprocessing:
  rescaling: { scale: 1/127.5, offset: -1 }
  resizing:
    aspect_ratio: fit
    interpolation: nearest
  color_mode: rgb

data_augmentation:
  random_rotation:
    factor: (-0.2,0.2) # -+0.1 = -+36 degree angle
    fill_mode: constant
    fill_value: -1.
  random_periodic_resizing:
    image_sizes: [[192,192],[224,224],[256,256]]
    period: 10
  random_contrast:
    factor: 0.4
  random_brightness:
    factor: 0.3
  random_flip:
    mode: horizontal

training:
  batch_size: 64
  epochs: 1000
  optimizer:
    Adam:
      learning_rate: 5.0e-4
  callbacks:
    ReduceLROnPlateau:
      monitor: val_oks
      mode: max
      factor: 0.5
      min_delta: 0.0001
      patience: 30
    ModelCheckpoint:
      monitor: val_oks
      mode: max
    EarlyStopping:
      monitor: val_oks
      mode: max
      min_delta: 0.0001
      patience: 45

quantization:
  quantizer: TFlite_converter
  quantization_type: PTQ
  quantization_input_type: uint8
  quantization_output_type: int8
  export_dir: quantized_models

mlflow:
  uri: ./tf/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}