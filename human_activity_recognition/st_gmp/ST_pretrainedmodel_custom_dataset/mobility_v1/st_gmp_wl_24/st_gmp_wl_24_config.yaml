general:
  project_name: human_activity_recognition
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: true
  global_seed: 123
  gpu_memory_limit: 4
operation_mode: training
dataset:
  dataset_name: mobility_v1
  class_names:
  - Stationary
  - Walking
  - Jogging
  - Biking
  training_path: C:/__/datasets/har_mobility_v1/train.pkl
  validation_split: 0.2
  test_path: C:/__/datasets/har_mobility_v1/test.pkl
  test_split: 0.25
preprocessing:
  gravity_rot_sup: true
  normalization: false
model:
  model_name: st_gmp
  input_shape: (24, 3, 1)
training:
  dropout: 0.5
  batch_size: 256
  epochs: 200
  optimizer:
    Adam:
      learning_rate: 0.001
  callbacks:
    ReduceLROnPlateau:
      monitor: val_accuracy
      mode: max
      factor: 0.5
      patience: 40
      min_lr: 1.0e-05
    EarlyStopping:
      monitor: val_accuracy
      mode: max
      restore_best_weights: true
      patience: 60
mlflow:
  uri: ./tf/src/experiments_outputs/mlruns
  
hydra:
   run:
      dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}