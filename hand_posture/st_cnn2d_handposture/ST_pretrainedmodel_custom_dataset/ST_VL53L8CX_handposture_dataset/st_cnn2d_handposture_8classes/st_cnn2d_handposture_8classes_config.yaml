general:
  project_name: handposture
  logs_dir: logs
  saved_models_dir: saved_models
  display_figures: true
  global_seed: 42
  gpu_memory_limit: 24
operation_mode: training
model:
  model_name: st_cnn2d_handposture
  input_shape: (8, 8, 2)
dataset:
  dataset_name: ST_handposture_dataset
  class_names:
  - None
  - Like
  - Dislike
  - FlatHand
  - Fist
  - Love
  - BreakTime
  - CrossHands
  training_path: /local/datasets/hpr_st_vl53l8cx_handposture_dataset
  validation_path: null
  validation_split: null
  test_path: null
preprocessing:
  Max_distance: 400
  Min_distance: 100
  Background_distance: 120
data_augmentation:
  random_flip:
    mode: horizontal
training:
  frozen_layers: null
  dropout: 0.2
  batch_size: 32
  epochs: 1000
  optimizer:
    Adam:
      learning_rate: 0.01
  callbacks:
    ReduceLROnPlateau:
      monitor: val_loss
      factor: 0.1
      patience: 20
      min_lr: 0.0001
    EarlyStopping:
      monitor: val_accuracy
      restore_best_weights: true
      patience: 40
tools:
  stedgeai:
    optimization: balanced
    on_cloud: true
    path_to_stedgeai: C:/ST/STEdgeAI/<x.y>/Utilities/windows/stedgeai.exe
  path_to_cubeIDE: C:/ST/STM32CubeIDE_<*.*.*>/STM32CubeIDE/stm32cubeide.exe
benchmarking:
  board: NUCLEO-F401RE
deployment:
  c_project_path: ../stm32ai_application_code/hand_posture/
  IDE: GCC
  verbosity: 1
  hardware_setup:
    serie: STM32F4
    board: NUCLEO-F401RE
mlflow:
  uri: ./tf/src/experiments_outputs/mlruns
hydra:
  run:
    dir: ./tf/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}